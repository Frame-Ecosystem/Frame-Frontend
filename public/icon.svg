<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="frame Beauty">
  <title>frame Beauty</title>
  <!--
    PWA-friendly maskable icon.
    - Solid background fills the full bleed (required for `purpose: maskable`).
    - All content is contained within the safe zone (central 80%).
    - Uses the brand logo: "frame Beauty" with silver underlined Beauty accent.
  -->

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0A0A0A"/>

  <!-- "frame" — white, extra-bold -->
  <text x="256" y="255"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-weight="900"
    font-size="120"
    letter-spacing="-4"
    fill="#FFFFFF"
    text-anchor="middle">
    frame
  </text>

  <!-- "Beauty" — silver, underlined -->
  <text x="256" y="330"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-weight="700"
    font-size="52"
    fill="#A8A8A8"
    text-anchor="middle"
    text-decoration="underline">
    Beauty
  </text>
</svg>
