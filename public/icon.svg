<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Frame Beauty">
  <title>Frame Beauty</title>
  <!--
    PWA-friendly maskable icon.
    - Solid background fills the full bleed (required for `purpose: maskable`).
    - All content is contained within the safe zone (central 80% / radius 205 from center).
    - Pure SVG, no fonts, scales infinitely; works as favicon, Apple touch icon, and Android PWA icon.
  -->

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0A0A0A"/>

  <!-- Outer frame: open at top-right and bottom-left corners -->
  <g fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 168 102 H 102 V 168"/>
    <path d="M 344 102 H 410 V 168"/>
    <path d="M 102 344 V 410 H 168"/>
    <path d="M 410 344 V 410 H 344"/>
  </g>

  <!-- Stylized "F" -->
  <g fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 192 168 V 344"/>
    <path d="M 192 168 H 320"/>
    <path d="M 192 256 H 282"/>
  </g>

  <!-- "beauty" accent dot (warm gold, complements the dark bg) -->
  <circle cx="346" cy="346" r="26" fill="#ECB916"/>
</svg>
